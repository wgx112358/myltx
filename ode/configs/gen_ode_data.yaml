# ODE 轨迹数据生成配置
# 教师模型（非蒸馏）以 N=40 步运行，在与蒸馏模型对齐的 sigma 处保存中间状态。
# Stage 1: 512x768 半分辨率，保存 9 个 checkpoint
# Stage 2: 1024x1536 全分辨率，从 Stage1 upsampled latent 加噪后跑，保存 4 个 checkpoint

# ── 模型路径 ─────────────────────────────────────────────────────────────────
checkpoint_path: /mnt/shared-storage-user/worldmodel-shared/wgx/ltx-2.0_old_1/models/ltx-2.3-22b-dev.safetensors
gemma_root: /mnt/shared-storage-user/worldmodel-shared/wgx/ltx-2.0_old_1/models/gemma3
spatial_upsampler_path: /mnt/shared-storage-user/worldmodel-shared/wgx/ltx-2.0_old_1/models/ltx2/ltx-2.3-spatial-upscaler-x2-1.0.safetensors

# ── 数据路径 ─────────────────────────────────────────────────────────────────
caption_path: /mnt/shared-storage-user/worldmodel-shared/wgx/LTX-2/datagen/ltx_prompts_12000.csv
output_dir: /mnt/shared-storage-user/worldmodel-shared/wgx/LTX-2/ode/data

# ── 视频参数 ─────────────────────────────────────────────────────────────────
# Stage 1 分辨率（Stage 2 自动 2x）
stage1_height: 512
stage1_width: 768
num_frames: 121   # 必须满足 (num_frames - 1) % 8 == 0
frame_rate: 24.0

# ── 扩散参数 ─────────────────────────────────────────────────────────────────
teacher_steps: 40           # 教师模型推理步数（与蒸馏 sigma 对齐的最优步数）
seed: 42

# CFG guidance scale
video_cfg_scale: 3.0
audio_cfg_scale: 7.0

# 负向提示词
negative_prompt: >
  blurry, out of focus, overexposed, underexposed, low contrast, washed out colors,
  excessive noise, grainy texture, poor lighting, flickering, motion blur,
  distorted proportions, deformed facial features, extra limbs, artifacts,
  inconsistent perspective, camera shake, jitter, bad hands, distortion.

# ── 运行参数 ─────────────────────────────────────────────────────────────────
# 处理的 prompt 数量上限（-1 表示全部）
max_samples: -1
# prompt CSV 中文本列名
prompt_column: text_prompt
